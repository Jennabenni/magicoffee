<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form Tests</title>
    <style>
        body { font-family: monospace; padding: 2rem; background: #f5f5f5; }
        h1 { font-size: 1.2rem; margin-bottom: 1.5rem; }
        .suite { margin-bottom: 1.5rem; }
        .suite-name { font-weight: bold; font-size: 1rem; margin-bottom: 0.5rem; color: #333; }
        .test { padding: 0.25rem 0.5rem; margin: 2px 0; border-radius: 3px; font-size: 0.88rem; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        .summary { margin-top: 1.5rem; font-size: 1rem; font-weight: bold; }
        .summary.all-pass { color: #155724; }
        .summary.has-fail  { color: #721c24; }
        /* hidden form used by tests */
        #test-form-host { display: none; }
    </style>
</head>
<body>
    <h1>Contact Form — Validation Tests</h1>
    <div id="results"></div>
    <div id="summary"></div>

    <!-- Hidden host for the real form DOM -->
    <div id="test-form-host">
        <form id="contactForm" action="#" method="post" novalidate>
            <input type="text" id="firstName" name="firstName">
            <span class="field-error" id="firstNameError"></span>
            <input type="text" id="lastName"  name="lastName">
            <span class="field-error" id="lastNameError"></span>
            <input type="text" id="email"     name="email">
            <span class="field-error" id="emailError"></span>
            <textarea id="message" name="message"></textarea>
            <span class="field-error" id="messageError"></span>
            <button type="submit" id="submitBtn" disabled>Send Message</button>
        </form>
    </div>

    <!-- Paste the exact validation script from contactUs.html -->
    <script>
        const namePattern = /^[a-zA-Z']+$/;
        const emailPattern = /^[a-zA-Z0-9.]+@[a-zA-Z0-9.]+\.[a-zA-Z0-9.]+$/;

        const fields = {
            firstName: { el: document.getElementById('firstName'), err: document.getElementById('firstNameError'), valid: false },
            lastName:  { el: document.getElementById('lastName'),  err: document.getElementById('lastNameError'),  valid: false },
            email:     { el: document.getElementById('email'),     err: document.getElementById('emailError'),     valid: false },
            message:   { el: document.getElementById('message'),   err: document.getElementById('messageError'),   valid: false }
        };
        const submitBtn = document.getElementById('submitBtn');

        function validate(key) {
            const { el, err } = fields[key];
            const val = el.value.trim();
            let msg = '';

            if (key === 'firstName' || key === 'lastName') {
                const label = key === 'firstName' ? 'First name' : 'Last name';
                if (!val) {
                    msg = label + ' is required.';
                } else if (!namePattern.test(val)) {
                    msg = label + ' may only contain letters and apostrophes.';
                }
            } else if (key === 'email') {
                if (!val) {
                    msg = 'Email is required.';
                } else if (!emailPattern.test(val)) {
                    msg = 'Please enter a valid email address.';
                }
            } else if (key === 'message') {
                if (!val) msg = 'Message is required.';
            }

            err.textContent = msg;
            fields[key].valid = msg === '';
            submitBtn.disabled = !Object.values(fields).every(f => f.valid);
        }

        Object.keys(fields).forEach(key => {
            fields[key].el.addEventListener('input', () => validate(key));
            fields[key].el.addEventListener('blur',  () => validate(key));
        });

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
        });
    </script>

    <!-- Test runner -->
    <script>
        const suites = [];
        let currentSuite = null;

        function describe(name, fn) {
            currentSuite = { name, tests: [] };
            suites.push(currentSuite);
            fn();
        }

        function it(desc, fn) {
            let passed = false, error = '';
            try { fn(); passed = true; }
            catch(e) { error = e.message; }
            currentSuite.tests.push({ desc, passed, error });
        }

        function expect(actual) {
            return {
                toBe(expected) {
                    if (actual !== expected)
                        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
                },
                toContain(substr) {
                    if (!String(actual).includes(substr))
                        throw new Error(`Expected "${actual}" to contain "${substr}"`);
                },
                toBeEmpty() {
                    if (actual !== '')
                        throw new Error(`Expected empty string, got "${actual}"`);
                },
                toBeTruthy() {
                    if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
                },
                toBeFalsy() {
                    if (actual)  throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
                }
            };
        }

        // --- helpers ---
        function set(key, value) {
            fields[key].el.value = value;
            validate(key);
        }

        function errorOf(key) {
            return fields[key].err.textContent;
        }

        function resetAll() {
            Object.keys(fields).forEach(k => {
                fields[k].el.value = '';
                fields[k].valid = false;
                fields[k].err.textContent = '';
            });
            submitBtn.disabled = true;
        }

        // ================================================================
        // TESTS
        // ================================================================

        describe('Submit button — initial state', () => {
            it('is disabled before any input', () => {
                resetAll();
                expect(submitBtn.disabled).toBe(true);
            });
        });

        describe('First Name validation', () => {
            it('shows required error when empty', () => {
                resetAll();
                set('firstName', '');
                expect(errorOf('firstName')).toContain('required');
            });

            it('accepts plain letters', () => {
                resetAll();
                set('firstName', 'Jane');
                expect(errorOf('firstName')).toBeEmpty();
            });

            it("accepts a name with an apostrophe (O'Brien)", () => {
                resetAll();
                set('firstName', "O'Brien");
                expect(errorOf('firstName')).toBeEmpty();
            });

            it('rejects numbers', () => {
                resetAll();
                set('firstName', 'Jane2');
                expect(errorOf('firstName')).toContain('letters and apostrophes');
            });

            it('rejects special characters', () => {
                resetAll();
                set('firstName', 'Jane!');
                expect(errorOf('firstName')).toContain('letters and apostrophes');
            });

            it('rejects spaces', () => {
                resetAll();
                set('firstName', 'Jane Doe');
                expect(errorOf('firstName')).toContain('letters and apostrophes');
            });
        });

        describe('Last Name validation', () => {
            it('shows required error when empty', () => {
                resetAll();
                set('lastName', '');
                expect(errorOf('lastName')).toContain('required');
            });

            it('accepts plain letters', () => {
                resetAll();
                set('lastName', 'Smith');
                expect(errorOf('lastName')).toBeEmpty();
            });

            it("accepts a name with an apostrophe (O'Connor)", () => {
                resetAll();
                set('lastName', "O'Connor");
                expect(errorOf('lastName')).toBeEmpty();
            });

            it('rejects numbers', () => {
                resetAll();
                set('lastName', 'Smith3');
                expect(errorOf('lastName')).toContain('letters and apostrophes');
            });

            it('rejects special characters', () => {
                resetAll();
                set('lastName', 'Smith#');
                expect(errorOf('lastName')).toContain('letters and apostrophes');
            });
        });

        describe('Email validation', () => {
            it('shows required error when empty', () => {
                resetAll();
                set('email', '');
                expect(errorOf('email')).toContain('required');
            });

            it('accepts a standard email address', () => {
                resetAll();
                set('email', 'user@example.com');
                expect(errorOf('email')).toBeEmpty();
            });

            it('accepts an email with dots and numbers', () => {
                resetAll();
                set('email', 'jane.doe123@mail.domain.org');
                expect(errorOf('email')).toBeEmpty();
            });

            it('rejects an address missing @', () => {
                resetAll();
                set('email', 'userexample.com');
                expect(errorOf('email')).toContain('valid email');
            });

            it('rejects an address missing a domain', () => {
                resetAll();
                set('email', 'user@');
                expect(errorOf('email')).toContain('valid email');
            });

            it('rejects an address missing a TLD', () => {
                resetAll();
                set('email', 'user@example');
                expect(errorOf('email')).toContain('valid email');
            });

            it('rejects an address with invalid characters', () => {
                resetAll();
                set('email', 'user name@example.com');
                expect(errorOf('email')).toContain('valid email');
            });
        });

        describe('Message validation', () => {
            it('shows required error when empty', () => {
                resetAll();
                set('message', '');
                expect(errorOf('message')).toContain('required');
            });

            it('clears the error when text is entered', () => {
                resetAll();
                set('message', 'Hello there!');
                expect(errorOf('message')).toBeEmpty();
            });

            it('treats whitespace-only as empty', () => {
                resetAll();
                set('message', '   ');
                expect(errorOf('message')).toContain('required');
            });
        });

        describe('Submit button — enabled only when all fields valid', () => {
            it('remains disabled when only first name is filled', () => {
                resetAll();
                set('firstName', 'Jane');
                expect(submitBtn.disabled).toBe(true);
            });

            it('remains disabled when three of four fields are valid', () => {
                resetAll();
                set('firstName', 'Jane');
                set('lastName',  'Doe');
                set('email',     'jane@example.com');
                expect(submitBtn.disabled).toBe(true);
            });

            it('becomes enabled when all four fields are valid', () => {
                resetAll();
                set('firstName', 'Jane');
                set('lastName',  'Doe');
                set('email',     'jane@example.com');
                set('message',   'Hello!');
                expect(submitBtn.disabled).toBe(false);
            });

            it('disables again when a valid field is cleared', () => {
                resetAll();
                set('firstName', 'Jane');
                set('lastName',  'Doe');
                set('email',     'jane@example.com');
                set('message',   'Hello!');
                // now clear email
                set('email', '');
                expect(submitBtn.disabled).toBe(true);
            });

            it('disables again when a field becomes invalid', () => {
                resetAll();
                set('firstName', 'Jane');
                set('lastName',  'Doe');
                set('email',     'jane@example.com');
                set('message',   'Hello!');
                // introduce invalid first name
                set('firstName', 'Jane123');
                expect(submitBtn.disabled).toBe(true);
            });
        });

        // ================================================================
        // Render results
        // ================================================================
        let totalPass = 0, totalFail = 0;
        const resultsEl = document.getElementById('results');

        suites.forEach(suite => {
            const suiteDiv = document.createElement('div');
            suiteDiv.className = 'suite';
            const title = document.createElement('div');
            title.className = 'suite-name';
            title.textContent = suite.name;
            suiteDiv.appendChild(title);

            suite.tests.forEach(t => {
                const div = document.createElement('div');
                div.className = 'test ' + (t.passed ? 'pass' : 'fail');
                div.textContent = (t.passed ? '✓ ' : '✗ ') + t.desc + (t.error ? ' — ' + t.error : '');
                suiteDiv.appendChild(div);
                t.passed ? totalPass++ : totalFail++;
            });

            resultsEl.appendChild(suiteDiv);
        });

        const summaryEl = document.getElementById('summary');
        summaryEl.className = 'summary ' + (totalFail === 0 ? 'all-pass' : 'has-fail');
        summaryEl.textContent = `${totalPass + totalFail} tests: ${totalPass} passed, ${totalFail} failed`;
    </script>
</body>
</html>
